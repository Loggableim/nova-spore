name: Nova Spore

on:
  schedule:
    - cron: '0 */6 * * *'   # Alle 6 Stunden
  workflow_dispatch:          # Manuell triggerbar
  push:
    branches: [ main, master ]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  spore:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN || '' }}
      NOVA_SEED: ${{ secrets.NOVA_SEED || '' }}

    steps:
      - uses: actions/checkout@v4
      
      - name: Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: |
          pip install httpx cryptography aiohttp
          
      - name: 🧬 Nova Spore Heartbeat
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          NOVA_SEED: ${{ secrets.NOVA_SEED }}
          NOVA_COORDINATOR: https://wordstructor.com/nova/spore
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          python nova_spore.py heartbeat --env github_actions
          
      - name: 🔁 Replication Scan
        if: env.GH_TOKEN != ''
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || '' }}
          NOVA_SEED: ${{ secrets.NOVA_SEED }}
          NOVA_COORDINATOR: https://wordstructor.com/nova/spore
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python nova_spore.py replicate --max-actions 3
